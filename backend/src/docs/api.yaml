openapi: 3.0.0
info:
  title: Primetrade Assignment API
  version: 1.0.0
paths:
  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string }
                role: { type: string, enum: [user, admin] }
                adminCreationSecret: { type: string }
      responses:
        '201': { description: User registered }
  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200': { description: Login successful }
  /tasks:
    get:
      summary: List tasks
      security:
        - bearerAuth: []
      responses:
        '200': { description: Tasks list }
    post:
      summary: Create task
      security:
        - bearerAuth: []
      responses:
        '201': { description: Task created }
  /tasks/{id}:
    put:
      summary: Update task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Task updated }
    delete:
      summary: Delete task
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Task deleted }